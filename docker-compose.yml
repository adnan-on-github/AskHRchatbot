services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: askhr-backend
    env_file: .env
    environment:
      CHROMA_PERSIST_DIR: /app/chroma_db
      DOCUMENTS_DIR: /app/data/documents
      WEB_SOURCES_FILE: /app/data/web_sources.txt
    volumes:
      - ./data:/app/data          # HR document files
      - ./chroma_db:/app/chroma_db  # Persist vector DB
      - ./logs:/app/logs          # Persist logs
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: askhr-frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
